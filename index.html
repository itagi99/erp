<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ANPMART Mobile ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-100 font-sans antialiased text-slate-800 pb-24">

    <header class="bg-blue-600 text-white p-4 shadow-lg sticky top-0 z-50 flex justify-between items-center">
        <h1 class="text-xl font-extrabold tracking-tight"><i class="fas fa-store mr-2"></i> ANPMART <span class="font-light text-blue-200">LIVE</span></h1>
        <button onclick="loadDashboard()" class="bg-blue-500 w-10 h-10 rounded-full shadow hover:bg-blue-400 active:scale-90 transition transform flex justify-center items-center">
            <i class="fas fa-sync-alt"></i>
        </button>
    </header>

    <main class="p-4 max-w-md mx-auto space-y-5">
        
        <div class="grid grid-cols-2 gap-4">
            <div class="glass-card p-4 rounded-2xl shadow-sm border border-slate-200 border-b-4 border-b-emerald-500">
                <p class="text-[11px] text-slate-500 font-bold uppercase tracking-wider mb-1">Total Sales</p>
                <p class="text-2xl font-black text-slate-800" id="kpi-sales">₹0.00</p>
            </div>
            <div class="glass-card p-4 rounded-2xl shadow-sm border border-slate-200 border-b-4 border-b-rose-500">
                <p class="text-[11px] text-slate-500 font-bold uppercase tracking-wider mb-1">Total Due</p>
                <p class="text-2xl font-black text-slate-800" id="kpi-due">₹0.00</p>
            </div>
        </div>

        <div class="glass-card rounded-2xl shadow-sm border border-slate-200 p-5">
            <h2 class="text-lg font-bold text-slate-800 mb-4"><i class="fas fa-bolt text-yellow-500 mr-2"></i> Fast Mobile Billing</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase mb-1 block">Select or Type Customer</label>
                    <input type="text" id="cust-name" list="cust-list" placeholder="Walk-in" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 text-lg transition">
                    <datalist id="cust-list"></datalist>
                </div>
                
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase mb-1 block">Bill Amount (₹)</label>
                    <input type="number" id="bill-amt" placeholder="0.00" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 text-2xl font-bold text-center transition">
                </div>

                <button onclick="submitQuickBill()" id="btn-submit" class="w-full bg-blue-600 text-white font-bold text-lg p-4 rounded-xl shadow-md shadow-blue-500/30 hover:bg-blue-700 active:bg-blue-800 active:scale-[0.98] transition flex justify-center items-center">
                    <i class="fas fa-paper-plane mr-2"></i> Generate M-Bill
                </button>
            </div>
        </div>

        <div>
            <div class="flex justify-between items-end mb-3">
                <h2 class="text-lg font-bold text-slate-800">Live Global Feed</h2>
                <span class="text-xs font-bold text-emerald-500 bg-emerald-100 px-2 py-1 rounded-md animate-pulse">LIVE</span>
            </div>
            
            <div id="bills-list" class="space-y-3">
                <p class="text-center text-slate-400 py-10"><i class="fas fa-spinner fa-spin text-2xl mb-2"></i><br>Syncing with Turso Cloud...</p>
            </div>
        </div>
    </main>

    <script>
        async function loadDashboard() {
            try {
                const response = await fetch('/api/dashboard');
                const data = await response.json();
                
                if (data.status === 'success') {
                    document.getElementById('kpi-sales').innerText = '₹' + data.total_sales.toLocaleString('en-IN', {minimumFractionDigits: 0});
                    document.getElementById('kpi-due').innerText = '₹' + data.total_due.toLocaleString('en-IN', {minimumFractionDigits: 0});
                    
                    // Populate Datalist
                    const datalist = document.getElementById('cust-list');
                    datalist.innerHTML = '';
                    data.customers.forEach(c => {
                        datalist.innerHTML += `<option value="${c}">`;
                    });

                    // Render Bills
                    const list = document.getElementById('bills-list');
                    list.innerHTML = '';
                    data.recent_bills.forEach(bill => {
                        const isMobile = bill.bill_no.startsWith('M-');
                        const badgeColor = isMobile ? 'bg-purple-100 text-purple-700 border-purple-200' : 'bg-blue-100 text-blue-700 border-blue-200';
                        const icon = isMobile ? 'fa-mobile-screen' : 'fa-desktop';
                        
                        list.innerHTML += `
                            <div class="glass-card p-4 rounded-2xl shadow-sm border border-slate-200 flex justify-between items-center">
                                <div>
                                    <p class="text-md font-bold text-slate-800">${bill.customer}</p>
                                    <p class="text-xs font-medium text-slate-400 mt-0.5"><i class="far fa-calendar-alt mr-1"></i> ${bill.date}</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-lg font-black text-slate-800">₹${bill.amount.toLocaleString('en-IN')}</p>
                                    <span class="inline-block mt-1 text-[10px] font-extrabold px-2 py-0.5 rounded-md border ${badgeColor}">
                                        <i class="fas ${icon} mr-1"></i> ${bill.bill_no}
                                    </span>
                                </div>
                            </div>
                        `;
                    });
                }
            } catch (error) {
                console.error("Error:", error);
            }
        }

        async function submitQuickBill() {
            const btn = document.getElementById('btn-submit');
            const customer = document.getElementById('cust-name').value;
            const amount = document.getElementById('bill-amt').value;

            if (!amount || amount <= 0) {
                alert("Please enter a valid amount.");
                return;
            }

            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Processing...';
            btn.disabled = true;
            btn.classList.add('opacity-75');

            try {
                const response = await fetch('/api/quick_bill', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ customer: customer, amount: amount })
                });
                
                const result = await response.json();
                if (result.status === 'success') {
                    document.getElementById('cust-name').value = '';
                    document.getElementById('bill-amt').value = '';
                    await loadDashboard(); 
                } else {
                    alert("Error: " + result.message);
                }
            } catch (error) {
                alert("Connection error. Check internet.");
            } finally {
                btn.innerHTML = '<i class="fas fa-paper-plane mr-2"></i> Generate M-Bill';
                btn.disabled = false;
                btn.classList.remove('opacity-75');
            }
        }

        window.onload = loadDashboard;
    </script>
</body>
</html>
