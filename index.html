<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ANPMART Mobile ERP</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body class="bg-slate-100 font-sans antialiased text-slate-800 h-[100dvh] flex flex-col overflow-hidden">

    <div id="login-screen" class="absolute inset-0 z-[200] bg-slate-900 flex flex-col justify-center items-center p-6">
        <div class="glass-card w-full max-w-sm p-8 rounded-3xl shadow-2xl text-center">
            <div class="w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg"><i class="fas fa-lock text-3xl text-white"></i></div>
            <h2 class="text-2xl font-black text-slate-800 mb-2">ANPMART ERP</h2>
            <p class="text-sm text-slate-500 font-bold mb-6">Restricted Access</p>
            <input type="password" id="login-pin" placeholder="Enter PIN" class="w-full p-4 bg-slate-100 border border-slate-300 rounded-xl text-center text-2xl tracking-[0.5em] font-bold focus:outline-none focus:ring-2 focus:ring-blue-500 mb-4">
            <button onclick="checkLogin()" class="w-full bg-blue-600 text-white font-bold text-lg p-4 rounded-xl shadow-md hover:bg-blue-700 active:scale-95 transition">Unlock System</button>
        </div>
    </div>

    <div id="app-screen" class="hidden flex-col h-full w-full absolute inset-0">
        
        <header class="bg-blue-600 text-white p-3 shadow-md z-40 flex justify-between items-center shrink-0">
            <h1 class="text-lg font-extrabold tracking-tight"><i class="fas fa-store mr-2"></i> ANP<span class="font-light text-blue-200" id="header-title">DASH</span></h1>
            <button onclick="syncData()" id="btn-sync" class="bg-blue-500 w-9 h-9 rounded-full shadow active:scale-90 flex justify-center items-center"><i class="fas fa-sync-alt"></i></button>
        </header>

        <main class="flex-1 overflow-y-auto hide-scroll p-3 pb-24" id="main-content">
            
            <div id="tab-dashboard" class="tab-content space-y-4 block">
                <div class="grid grid-cols-2 gap-3">
                    <div class="glass-card p-4 rounded-2xl shadow-sm border-b-4 border-b-emerald-500">
                        <p class="text-[10px] text-slate-500 font-bold uppercase mb-1">Total Sales</p>
                        <p class="text-xl font-black text-slate-800" id="kpi-sales">₹0</p>
                    </div>
                    <div class="glass-card p-4 rounded-2xl shadow-sm border-b-4 border-b-rose-500">
                        <p class="text-[10px] text-slate-500 font-bold uppercase mb-1">Total Due</p>
                        <p class="text-xl font-black text-slate-800" id="kpi-due">₹0</p>
                    </div>
                </div>
                <div class="flex justify-between items-end mt-4 mb-2">
                    <h2 class="text-md font-bold text-slate-800">Recent Global Bills</h2>
                    <span class="text-[10px] font-bold text-emerald-500 bg-emerald-100 px-2 py-1 rounded-md animate-pulse">LIVE</span>
                </div>
                <div id="dashboard-feed" class="space-y-3 pb-4"></div>
            </div>

            <div id="tab-pos" class="tab-content hidden h-full flex-col space-y-2">
                <div class="flex justify-between items-center bg-white p-2 rounded-lg shadow-sm border border-slate-200 shrink-0">
                    <span class="text-[10px] font-bold text-slate-500 uppercase">Customer</span>
                    <span class="text-[10px] font-bold text-blue-600 bg-blue-100 px-2 py-0.5 rounded" id="pos-bill-no">M-NEW</span>
                </div>
                
                <div class="relative shrink-0">
                    <input type="text" id="pos-cust" onkeyup="filterAC('pos-cust', 'ac-cust')" placeholder="Customer Name (Walk-in)" class="w-full p-2 bg-white border border-slate-300 rounded-lg text-sm font-bold focus:ring-2 focus:ring-blue-500">
                    <div id="ac-cust" class="ac-dropdown"></div>
                </div>

                <div class="bg-blue-50 p-2 rounded-xl border border-blue-100 shadow-sm relative shrink-0">
                    <input type="text" id="pos-item" onkeyup="filterAC('pos-item', 'ac-item')" onchange="autoFillPrice()" placeholder="Search Item..." class="w-full p-2 bg-white border border-slate-300 rounded-lg text-sm font-bold mb-2 focus:ring-2 focus:ring-blue-500">
                    <div id="ac-item" class="ac-dropdown"></div>
                    
                    <div class="flex space-x-2 mb-2">
                        <input type="number" id="pos-qty" value="1" placeholder="Qty" class="w-1/4 p-2 bg-white border border-slate-300 rounded-lg text-center text-sm font-bold">
                        <select id="pos-unit" class="w-1/4 p-2 bg-white border border-slate-300 rounded-lg text-[10px] font-bold bg-white"><option>Pcs</option></select>
                        <input type="number" id="pos-rate" placeholder="Rate (₹)" class="w-2/4 p-2 bg-white border border-slate-300 rounded-lg text-center text-sm font-bold">
                    </div>
                    <button onclick="addToCart()" class="w-full bg-slate-800 text-white font-bold py-2 rounded-lg active:scale-95 text-sm shadow-md"><i class="fas fa-plus mr-1"></i> ADD TO CART</button>
                </div>

                <div class="flex-1 bg-white rounded-xl border border-slate-200 p-2 overflow-y-auto hide-scroll relative min-h-[100px]">
                    <div id="pos-cart-ui" class="space-y-1"><p class="text-center text-slate-400 text-xs mt-4">Cart Empty</p></div>
                </div>

                <div class="bg-slate-800 text-white p-3 rounded-xl shadow-lg shrink-0 mt-1">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-xs font-bold text-slate-300">Grand Total</span>
                        <span class="text-xl font-black text-emerald-400" id="pos-total">₹0.00</span>
                    </div>
                    <button onclick="saveMobileBill()" id="btn-save-bill" class="w-full bg-emerald-500 font-black text-sm py-3 rounded-lg shadow-md active:scale-95 transition">COMPLETE SALE</button>
                </div>
            </div>

            <div id="tab-sales" class="tab-content hidden space-y-3">
                <input type="text" id="search-sales" onkeyup="renderSales()" placeholder="Search Bills..." class="w-full p-3 bg-white border border-slate-200 rounded-xl text-sm shadow-sm sticky top-0 z-10">
                <div id="sales-list" class="space-y-2 pb-4"></div>
            </div>

            <div id="tab-ledger" class="tab-content hidden space-y-3">
                <input type="text" id="search-ledger" onkeyup="renderLedger()" placeholder="Search Dues..." class="w-full p-3 bg-white border border-slate-200 rounded-xl text-sm shadow-sm sticky top-0 z-10">
                <div id="ledger-list" class="space-y-2 pb-4"></div>
            </div>

            <div id="tab-more" class="tab-content hidden space-y-3">
                <button onclick="switchTab('stock', this)" class="w-full bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex items-center justify-between active:bg-slate-50">
                    <div class="flex items-center text-blue-600 font-bold"><i class="fas fa-box-open text-xl mr-3"></i> Master Stock</div>
                    <i class="fas fa-chevron-right text-slate-400"></i>
                </button>
                <button onclick="switchTab('attendance', this)" class="w-full bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex items-center justify-between active:bg-slate-50">
                    <div class="flex items-center text-emerald-600 font-bold"><i class="fas fa-user-clock text-xl mr-3"></i> Attendance</div>
                    <i class="fas fa-chevron-right text-slate-400"></i>
                </button>
            </div>

            <div id="tab-stock" class="tab-content hidden space-y-3">
                <button onclick="switchTab('more', this)" class="text-sm font-bold text-blue-600 mb-1"><i class="fas fa-arrow-left mr-1"></i> Back</button>
                <input type="text" id="search-stock" onkeyup="renderStock()" placeholder="Search Master..." class="w-full p-3 bg-white border border-slate-200 rounded-xl text-sm shadow-sm sticky top-0 z-10">
                <div id="stock-list" class="space-y-2 pb-4"></div>
            </div>

            <div id="tab-attendance" class="tab-content hidden space-y-3">
                <button onclick="switchTab('more', this)" class="text-sm font-bold text-blue-600 mb-1"><i class="fas fa-arrow-left mr-1"></i> Back</button>
                <h2 class="font-bold text-slate-700">Mark Today's Attendance</h2>
                <div id="attendance-list" class="space-y-2"></div>
                <button onclick="saveAttendance()" class="w-full bg-emerald-600 text-white font-bold p-3 rounded-xl shadow mt-4">💾 Save Attendance</button>
            </div>

        </main>

        <nav class="shrink-0 bg-white border-t border-slate-200 flex justify-around p-2 pb-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] z-50">
            <button onclick="switchTab('dashboard', this)" class="nav-btn active flex flex-col items-center text-blue-600 w-1/5"><i class="fas fa-home text-lg mb-1"></i><span class="text-[10px] font-bold">Home</span></button>
            <button onclick="switchTab('pos', this)" class="nav-btn flex flex-col items-center text-slate-400 w-1/5"><i class="fas fa-cash-register text-lg mb-1"></i><span class="text-[10px] font-bold">POS</span></button>
            <button onclick="switchTab('sales', this)" class="nav-btn flex flex-col items-center text-slate-400 w-1/5"><i class="fas fa-receipt text-lg mb-1"></i><span class="text-[10px] font-bold">Sales</span></button>
            <button onclick="switchTab('ledger', this)" class="nav-btn flex flex-col items-center text-slate-400 w-1/5"><i class="fas fa-wallet text-lg mb-1"></i><span class="text-[10px] font-bold">Ledger</span></button>
            <button onclick="switchTab('more', this)" class="nav-btn flex flex-col items-center text-slate-400 w-1/5"><i class="fas fa-bars text-lg mb-1"></i><span class="text-[10px] font-bold">More</span></button>
        </nav>

        <div id="modal-bill" class="hidden absolute inset-0 z-[110] bg-slate-900/60 flex justify-center items-center p-4">
            <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl flex flex-col max-h-[85vh]">
                <div class="p-3 border-b border-slate-100 flex justify-between items-center bg-slate-50 rounded-t-2xl">
                    <h3 class="font-bold text-slate-800 text-sm" id="m-bill-title">Bill Details</h3>
                    <button onclick="document.getElementById('modal-bill').classList.add('hidden')" class="text-slate-400 text-xl px-2"><i class="fas fa-times"></i></button>
                </div>
                <div class="p-4 overflow-y-auto text-xs font-mono text-slate-700 whitespace-pre-wrap flex-1" id="m-bill-content"></div>
                <div class="p-3 border-t border-slate-100 bg-slate-50 rounded-b-2xl">
                    <button id="btn-wa" class="w-full bg-emerald-500 text-white font-bold p-3 rounded-xl shadow active:scale-95 flex justify-center items-center"><i class="fab fa-whatsapp text-lg mr-2"></i> Send WhatsApp</button>
                </div>
            </div>
        </div>

        <div id="modal-pay" class="hidden absolute inset-0 z-[110] bg-slate-900/60 flex justify-center items-end p-0">
            <div class="bg-white w-full rounded-t-3xl shadow-2xl p-6 pb-12">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-black text-slate-800 text-lg" id="pay-cust-name">Receive Cash</h3>
                    <button onclick="document.getElementById('modal-pay').classList.add('hidden')" class="text-slate-400 text-xl"><i class="fas fa-times"></i></button>
                </div>
                <p class="text-xs font-bold text-slate-500 mb-1">Pending Due</p>
                <p class="text-2xl font-black text-rose-500 mb-4" id="pay-due">₹0.00</p>
                <input type="number" id="pay-amt" placeholder="Amount Received" class="w-full p-4 bg-slate-50 border border-slate-300 rounded-xl text-center text-xl font-bold mb-4 focus:ring-2 focus:ring-blue-500">
                <button onclick="savePayment()" class="w-full bg-blue-600 text-white font-bold p-4 rounded-xl shadow active:scale-95"><i class="fas fa-save mr-2"></i> Save Payment</button>
            </div>
        </div>

        <div id="modal-edit-item" class="hidden absolute inset-0 z-[110] bg-slate-900/60 flex justify-center items-center p-4">
            <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-black text-slate-800 text-lg">Edit Master</h3>
                    <button onclick="document.getElementById('modal-edit-item').classList.add('hidden')" class="text-slate-400 text-xl"><i class="fas fa-times"></i></button>
                </div>
                <input type="hidden" id="edit-id">
                <label class="text-[10px] font-bold text-slate-500 uppercase">Item Name</label>
                <input type="text" id="edit-name" class="w-full p-2 bg-slate-100 border border-slate-200 rounded-lg text-sm font-bold mb-3" readonly>
                <div class="flex space-x-3 mb-4">
                    <div class="w-1/2">
                        <label class="text-[10px] font-bold text-slate-500 uppercase">Rate (₹)</label>
                        <input type="number" id="edit-rate" class="w-full p-3 bg-white border border-slate-300 rounded-xl text-center font-bold focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="w-1/2">
                        <label class="text-[10px] font-bold text-slate-500 uppercase">Stock</label>
                        <input type="number" id="edit-stock" class="w-full p-3 bg-white border border-slate-300 rounded-xl text-center font-bold focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
                <button onclick="saveMasterEdit()" class="w-full bg-emerald-600 text-white font-bold p-3 rounded-xl shadow active:scale-95"><i class="fas fa-save mr-2"></i> Update Item</button>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
