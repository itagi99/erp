<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ANPMART ERP</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet"/>
  <style>
    body { -webkit-tap-highlight-color: transparent; } /* Better mobile feel */
    .glass { background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); }
    .hide-scroll::-webkit-scrollbar { display: none; }
    .hide-scroll { scrollbar-width: none; }
    .ac-dropdown { position: absolute; width:100%; background: #fff; max-height: 200px; overflow-y:auto; border-radius:.5em; border:1px solid #e2e8f0; z-index:9999;}
    .ac-item {padding:6px 10px; cursor:pointer;}
    .ac-item:hover {background:#e0eafe;}
    @media (max-width: 640px) { html { font-size: 15px; } }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-white to-emerald-50 min-h-[100dvh] overflow-x-hidden">
  <div id="main" class="flex flex-col items-center min-h-screen">
    <!-- Login, Main App UI, and Modals go here -->
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
