<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ANPMART Mobile ERP</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-100 font-sans antialiased text-slate-800 h-[100dvh] flex flex-col overflow-hidden">

    <div id="login-screen" class="absolute inset-0 z-[200] bg-slate-900 flex flex-col justify-center items-center p-4">
        <div class="glass-card w-full max-w-sm p-6 rounded-2xl shadow-2xl text-center">
            <div class="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center mx-auto mb-3 shadow-lg"><i class="fas fa-lock text-2xl text-white"></i></div>
            <h2 class="text-xl font-black text-slate-800 mb-1">ANPMART ERP</h2>
            <p class="text-xs text-slate-500 font-bold mb-5">Restricted Access</p>
            <input type="password" id="login-pin" placeholder="Enter PIN" class="w-full p-3 bg-slate-100 border border-slate-300 rounded-lg text-center text-xl tracking-[0.5em] font-bold focus:outline-none focus:ring-2 focus:ring-blue-500 mb-4">
            <button onclick="window.checkLogin()" class="w-full bg-blue-600 text-white font-bold text-sm p-3 rounded-lg shadow-md hover:bg-blue-700 active:scale-95 transition mb-4">Unlock System</button>
            
            <p id="debug-text" class="text-[10px] font-bold text-red-500">⚠️ System Status: Waiting for app.js...</p>
        </div>
    </div>

    <div id="app-screen" class="hidden flex-col h-full w-full absolute inset-0">
        
        <header class="bg-blue-600 text-white p-2 px-3 shadow-md z-40 flex justify-between items-center shrink-0">
            <h1 class="text-base font-extrabold tracking-tight"><i class="fas fa-store mr-1"></i> ANP<span class="font-light text-blue-200" id="header-title">DASH</span></h1>
            <button onclick="window.syncData()" id="btn-sync" class="bg-blue-500 w-7 h-7 rounded-full shadow active:scale-90 flex justify-center items-center text-xs"><i class="fas fa-sync-alt"></i></button>
        </header>

        <main class="flex-1 overflow-y-auto hide-scroll p-2 pb-20 relative" id="main-content">
            
            <div id="tab-dashboard" class="tab-content space-y-3 block">
                <div class="grid grid-cols-2 gap-2">
                    <div class="glass-card p-3 rounded-xl shadow-sm border-b-4 border-b-emerald-500">
                        <p class="text-[9px] text-slate-500 font-bold uppercase mb-0.5">All-Time Sales</p>
                        <p class="text-lg font-black text-slate-800" id="kpi-sales">₹0</p>
                    </div>
                    <div class="glass-card p-3 rounded-xl shadow-sm border-b-4 border-b-rose-500">
                        <p class="text-[9px] text-slate-500 font-bold uppercase mb-0.5">Total Due</p>
                        <p class="text-lg font-black text-slate-800" id="kpi-due">₹0</p>
                    </div>
                </div>
                <div class="flex justify-between items-end mt-3 mb-1">
                    <h2 class="text-sm font-bold text-slate-800">Recent Global Bills</h2>
                    <span class="text-[9px] font-bold text-emerald-500 bg-emerald-100 px-1.5 py-0.5 rounded animate-pulse">LIVE</span>
                </div>
                <div id="dashboard-feed" class="space-y-2 pb-2"></div>
            </div>

            <div id="tab-pos" class="tab-content hidden h-full flex-col space-y-2">
                <div class="flex justify-between items-center bg-white p-2 rounded-lg shadow-sm border border-slate-200 shrink-0">
                    <span class="text-[10px] font-bold text-slate-500 uppercase">Customer</span>
                    <span class="text-[9px] font-bold text-blue-600 bg-blue-100 px-1.5 py-0.5 rounded" id="pos-bill-no">M-NEW</span>
                </div>
                
                <div class="relative shrink-0">
                    <input type="text" id="pos-cust" onkeyup="window.filterAC('pos-cust', 'ac-cust')" placeholder="Customer Name (Walk-in)" class="w-full p-2 bg-white border border-slate-300 rounded-lg text-xs font-bold focus:ring-2 focus:ring-blue-500">
                    <div id="ac-cust" class="ac-dropdown text-xs"></div>
                </div>

                <div class="bg-blue-50 p-2 rounded-lg border border-blue-100 shadow-sm relative shrink-0">
                    <input type="text" id="pos-item" onkeyup="window.filterAC('pos-item', 'ac-item')" onchange="window.autoFillPrice()" placeholder="Search Item..." class="w-full p-2 bg-white border border-slate-300 rounded-lg text-xs font-bold mb-2 focus:ring-2 focus:ring-blue-500">
                    <div id="ac-item" class="ac-dropdown text-xs"></div>
                    
                    <div class="flex space-x-1 mb-2">
                        <input type="number" id="pos-qty" value="1" placeholder="Qty" class="w-1/4 p-1.5 bg-white border border-slate-300 rounded-lg text-center text-xs font-bold">
                        <select id="pos-unit" class="w-1/4 p-1.5 bg-white border border-slate-300 rounded-lg text-[10px] font-bold bg-white"><option>Pcs</option></select>
                        <input type="number" id="pos-rate" placeholder="Rate (₹)" class="w-2/4 p-1.5 bg-white border border-slate-300 rounded-lg text-center text-xs font-bold">
                    </div>
                    <button onclick="window.addToCart()" class="w-full bg-slate-800 text-white font-bold py-2 rounded-lg active:scale-95 text-xs shadow-md"><i class="fas fa-plus mr-1"></i> ADD ITEM</button>
                </div>

                <div class="flex-1 bg-white rounded-lg border border-slate-200 p-1.5 overflow-y-auto hide-scroll relative min-h-[80px]">
                    <div id="pos-cart-ui" class="space-y-1"><p class="text-center text-slate-400 text-[10px] mt-2">Cart Empty</p></div>
                </div>

                <div class="bg-slate-800 text-white p-2.5 rounded-lg shadow-lg shrink-0 mt-1">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[10px] font-bold text-slate-300">Grand Total</span>
                        <span class="text-lg font-black text-emerald-400" id="pos-total">₹0.00</span>
                    </div>
                    <button onclick="window.saveMobileBill()" id="btn-save-bill" class="w-full bg-emerald-500 font-black text-xs py-2.5 rounded-md shadow-md active:scale-95 transition">COMPLETE SALE</button>
                </div>
            </div>

            <div id="tab-sales" class="tab-content hidden space-y-2">
                <div class="sticky top-0 z-10 bg-slate-100 pb-1 space-y-1.5 pt-1">
                    <input type="text" id="search-sales" onkeyup="window.renderSales()" placeholder="Search Bills..." class="w-full p-2 bg-white border border-slate-200 rounded-lg text-xs shadow-sm focus:ring-2 focus:ring-blue-500">
                    <div class="flex space-x-1.5">
                        <select id="filter-sales-time" onchange="window.renderSales()" class="w-1/2 p-2 bg-white border border-slate-200 rounded-lg text-[10px] font-bold text-slate-600 shadow-sm focus:ring-2 focus:ring-blue-500">
                            <option value="all">All Time</option>
                            <option value="today">Today</option>
                            <option value="7days">Last 7 Days</option>
                            <option value="month">This Month</option>
                        </select>
                        <select id="sort-sales" onchange="window.renderSales()" class="w-1/2 p-2 bg-white border border-slate-200 rounded-lg text-[10px] font-bold text-slate-600 shadow-sm focus:ring-2 focus:ring-blue-500">
                            <option value="newest">Newest First</option>
                            <option value="oldest">Oldest First</option>
                            <option value="highest">Highest Amount</option>
                        </select>
                    </div>
                </div>
                <div id="sales-list" class="space-y-1.5 pb-2"></div>
            </div>

            <div id="tab-ledger" class="tab-content hidden space-y-2">
                <div class="sticky top-0 z-10 bg-slate-100 pb-1 space-y-1.5 pt-1">
                    <input type="text" id="search-ledger" onkeyup="window.renderLedger()" placeholder="Search Dues by Name..." class="w-full p-2 bg-white border border-slate-200 rounded-lg text-xs shadow-sm focus:ring-2 focus:ring-blue-500">
                    <select id="sort-ledger" onchange="window.renderLedger()" class="w-full p-2 bg-white border border-slate-200 rounded-lg text-[10px] font-bold text-slate-600 shadow-sm focus:ring-2 focus:ring-blue-500">
                        <option value="highest">Highest Due First</option>
                        <option value="lowest">Lowest Due First</option>
                        <option value="az">Name (A-Z)</option>
                    </select>
                </div>
                <div id="ledger-list" class="space-y-1.5 pb-2"></div>
            </div>

            <div id="tab-more" class="tab-content hidden space-y-2 pt-2">
                <button onclick="window.switchTab('stock', this)" class="w-full bg-white p-3 rounded-lg shadow-sm border border-slate-200 flex items-center justify-between active:bg-slate-50">
                    <div class="flex items-center text-blue-600 font-bold text-sm"><i class="fas fa-box-open text-base mr-2"></i> Master Stock</div>
                    <i class="fas fa-chevron-right text-slate-400 text-xs"></i>
                </button>
                <button onclick="window.switchTab('attendance', this)" class="w-full bg-white p-3 rounded-lg shadow-sm border border-slate-200 flex items-center justify-between active:bg-slate-50">
                    <div class="flex items-center text-emerald-600 font-bold text-sm"><i class="fas fa-user-clock text-base mr-2"></i> Attendance</div>
                    <i class="fas fa-chevron-right text-slate-400 text-xs"></i>
                </button>
            </div>

            <div id="tab-stock" class="tab-content hidden space-y-2">
                <div class="sticky top-0 z-10 bg-slate-100 pb-1 pt-1 space-y-1.5">
                    <button onclick="window.switchTab('more', this)" class="text-xs font-bold text-blue-600 mb-1"><i class="fas fa-arrow-left mr-1"></i> Back</button>
                    <input type="text" id="search-stock" onkeyup="window.renderStock()" placeholder="Search Master..." class="w-full p-2 bg-white border border-slate-200 rounded-lg text-xs shadow-sm focus:ring-2 focus:ring-blue-500">
                    <select id="sort-stock" onchange="window.renderStock()" class="w-full p-2 bg-white border border-slate-200 rounded-lg text-[10px] font-bold text-slate-600 shadow-sm focus:ring-2 focus:ring-blue-500">
                        <option value="az">Name (A-Z)</option>
                        <option value="low">Lowest Stock First</option>
                        <option value="high">Highest Stock First</option>
                    </select>
                </div>
                <div id="stock-list" class="space-y-1.5 pb-2"></div>
            </div>

            <div id="tab-attendance" class="tab-content hidden space-y-2 pt-2">
                <button onclick="window.switchTab('more', this)" class="text-xs font-bold text-blue-600 mb-1"><i class="fas fa-arrow-left mr-1"></i> Back</button>
                <h2 class="font-bold text-slate-700 text-sm">Mark Today's Attendance</h2>
                <div id="attendance-list" class="space-y-1.5"></div>
                <button onclick="window.saveAttendance()" class="w-full bg-emerald-600 text-white font-bold p-2.5 rounded-lg shadow mt-3 text-sm">💾 Save Attendance</button>
            </div>

        </main>

        <nav class="shrink-0 bg-white border-t border-slate-200 flex justify-around p-1.5 pb-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] z-50">
            <button onclick="window.switchTab('dashboard', this)" class="nav-btn active flex flex-col items-center p-1 text-blue-600 w-1/5"><i class="fas fa-home text-base mb-0.5"></i><span class="text-[9px] font-bold">Home</span></button>
            <button onclick="window.switchTab('pos', this)" class="nav-btn flex flex-col items-center p-1 text-slate-400 w-1/5"><i class="fas fa-cash-register text-base mb-0.5"></i><span class="text-[9px] font-bold">POS</span></button>
            <button onclick="window.switchTab('sales', this)" class="nav-btn flex flex-col items-center p-1 text-slate-400 w-1/5"><i class="fas fa-receipt text-base mb-0.5"></i><span class="text-[9px] font-bold">Sales</span></button>
            <button onclick="window.switchTab('ledger', this)" class="nav-btn flex flex-col items-center p-1 text-slate-400 w-1/5"><i class="fas fa-wallet text-base mb-0.5"></i><span class="text-[9px] font-bold">Ledger</span></button>
            <button onclick="window.switchTab('more', this)" class="nav-btn flex flex-col items-center p-1 text-slate-400 w-1/5"><i class="fas fa-bars text-base mb-0.5"></i><span class="text-[9px] font-bold">Menu</span></button>
        </nav>

        <div id="modal-bill" class="hidden absolute inset-0 z-[110] bg-slate-900/60 flex justify-center items-center p-3">
            <div class="bg-white w-full max-w-sm rounded-xl shadow-2xl flex flex-col max-h-[85vh]">
                <div class="p-2 border-b border-slate-100 flex justify-between items-center bg-slate-50 rounded-t-xl">
                    <h3 class="font-bold text-slate-800 text-xs" id="m-bill-title">Bill Details</h3>
                    <button onclick="document.getElementById('modal-bill').classList.add('hidden')" class="text-slate-400 text-lg px-2"><i class="fas fa-times"></i></button>
                </div>
                <div class="p-3 overflow-y-auto text-[10px] font-mono text-slate-700 whitespace-pre-wrap flex-1 leading-tight" id="m-bill-content"></div>
                <div class="p-2 border-t border-slate-100 bg-slate-50 rounded-b-xl">
                    <button id="btn-wa" class="w-full bg-emerald-500 text-white font-bold p-2.5 rounded-lg shadow active:scale-95 flex justify-center items-center text-xs"><i class="fab fa-whatsapp text-sm mr-2"></i> Send WhatsApp</button>
                </div>
            </div>
        </div>

        <div id="modal-pay" class="hidden absolute inset-0 z-[110] bg-slate-900/60 flex justify-center items-end p-0">
            <div class="bg-white w-full rounded-t-2xl shadow-2xl p-5 pb-8">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="font-black text-slate-800 text-base" id="pay-cust-name">Receive Cash</h3>
                    <button onclick="document.getElementById('modal-pay').classList.add('hidden')" class="text-slate-400 text-lg"><i class="fas fa-times"></i></button>
                </div>
                <p class="text-[10px] font-bold text-slate-500 mb-0.5">Pending Due</p>
                <p class="text-xl font-black text-rose-500 mb-3" id="pay-due">₹0.00</p>
                <input type="number" id="pay-amt" placeholder="Amount Received" class="w-full p-3 bg-slate-50 border border-slate-300 rounded-lg text-center text-lg font-bold mb-3 focus:ring-2 focus:ring-blue-500">
                <button onclick="window.savePayment()" class="w-full bg-blue-600 text-white font-bold p-3 rounded-lg shadow active:scale-95 text-sm"><i class="fas fa-save mr-2"></i> Save Payment</button>
            </div>
        </div>

        <div id="modal-edit-item" class="hidden absolute inset-0 z-[110] bg-slate-900/60 flex justify-center items-center p-4">
            <div class="bg-white w-full max-w-sm rounded-xl shadow-2xl p-5">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="font-black text-slate-800 text-base">Edit Master</h3>
                    <button onclick="document.getElementById('modal-edit-item').classList.add('hidden')" class="text-slate-400 text-lg"><i class="fas fa-times"></i></button>
                </div>
                <input type="hidden" id="edit-id">
                <label class="text-[9px] font-bold text-slate-500 uppercase">Item Name</label>
                <input type="text" id="edit-name" class="w-full p-2 bg-slate-100 border border-slate-200 rounded-lg text-xs font-bold mb-2" readonly>
                <div class="flex space-x-2 mb-3">
                    <div class="w-1/2">
                        <label class="text-[9px] font-bold text-slate-500 uppercase">Rate (₹)</label>
                        <input type="number" id="edit-rate" class="w-full p-2.5 bg-white border border-slate-300 rounded-lg text-center font-bold text-sm focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="w-1/2">
                        <label class="text-[9px] font-bold text-slate-500 uppercase">Stock</label>
                        <input type="number" id="edit-stock" class="w-full p-2.5 bg-white border border-slate-300 rounded-lg text-center font-bold text-sm focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
                <button onclick="window.saveMasterEdit()" class="w-full bg-emerald-600 text-white font-bold p-2.5 rounded-lg shadow active:scale-95 text-sm"><i class="fas fa-save mr-2"></i> Update Item</button>
            </div>
        </div>

    </div>

    <script src="app.js"></script>

    <script>
        window.onload = function() {
            setTimeout(() => {
                const debugText = document.getElementById('debug-text');
                if (typeof window.syncData === 'undefined') {
                    debugText.innerText = "❌ ERROR: app.js did not load! Ensure app.js is uploaded to GitHub.";
                } else {
                    debugText.innerText = "✅ System Core Online.";
                    debugText.classList.replace("text-red-500", "text-emerald-500");
                }
            }, 500);
        }
    </script>
</body>
</html>
